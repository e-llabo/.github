name: Task
description: 通常の実装・調査・運用タスクを起票するテンプレート
title: "[TASK] "
labels: []
assignees: []
body:
  - type: textarea
    id: overview
    attributes:
      label: 概要
      description: 何を、なぜやるかを1-3行で記載
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 完了条件（受け入れ条件）
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: スコープ
      value: |
        - 対象:
        - 対象外:

  - type: textarea
    id: deadline
    attributes:
      label: 期日・見積り
      value: |
        - Target date（必須）:
        - 見積り（任意, 例: `est:0.5d` / `est:2d`）:
        - Milestone補足: Milestoneの期日（Due date）は未定でも可（スコープ管理を優先）

  - type: textarea
    id: dependencies
    attributes:
      label: 依存関係
      value: |
        - 関連Issue:
        - 関連PR:
        - 外部依存:

  - type: textarea
    id: blocked
    attributes:
      label: Blocked情報（該当時のみ）
      value: |
        - Blocked: `No` / `Yes`
        - Blocker Type: `Waiting External` / `Waiting Other Task` / `Need Decision` / `Env/Infra` / `Other`
        - 解除条件:

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: ログ、リンク、調査メモなど

  - type: checkboxes
    id: post-creation-check
    attributes:
      label: 起票後チェック（Project項目）
      options:
        - label: Milestone を設定した
        - label: Target date を設定した
        - label: 初期ステータスを `Backlog` または `Ready` に設定した
        - label: "`Blocked=Yes` の場合、`Blocker Type` と `Blocked Since` を設定した"
