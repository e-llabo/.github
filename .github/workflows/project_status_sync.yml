name: GitHub Project Status Sync

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]
  issues:
    types: [closed, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "変更を反映せず差分のみ確認"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: project-status-sync-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync project item status for PR/Issue events
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || 'e-llabo' }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER || '11' }}
          REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "PROJECT_AUTOMATION_TOKEN が未設定です。" >&2
            exit 1
          fi
          if ! gh api user >/dev/null 2>&1; then
            echo "PROJECT_AUTOMATION_TOKEN が無効です（HTTP 401）。トークン再発行・SSO承認・権限確認（repo/read:org/project）を実施してください。" >&2
            exit 1
          fi
          if ! gh project view "${PROJECT_NUMBER}" --owner "${PROJECT_OWNER}" --format json -q .id >/dev/null 2>&1; then
            echo "Project API へアクセスできません。PROJECT_AUTOMATION_TOKEN の project 権限と対象OrganizationへのSSO承認を確認してください。" >&2
            exit 1
          fi
          bash .github/scripts/sync_project_status_by_event.sh
